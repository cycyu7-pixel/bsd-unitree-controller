# ====================================================================
# bsd-unitree-controller Docker Compose 配置
#
# 部署到宇树 G1 机器人（unitree-g1-nx）使用。
#
# 关键设计：挂载机器人的 ROS 环境，不把 rclpy/unitree_api 装进镜像。
#   /opt/ros/humble          -> rclpy / std_srvs / geometry_msgs
#   /home/unitree/unitree_ros2_ws -> unitree_api（Unitree 编译的）
#
# 必须用 host 网络：ROS 2 DDS 用多播自动发现节点，
# bridge 网络会导致容器内外节点互相看不见。
# ====================================================================
version: "3.8"

services:
  bsd-controller:
    build: .
    image: bsd-unitree-controller:0.1.0
    container_name: bsd-controller
    # 关键：ROS 2 DDS 必须用主机网络
    network_mode: host
    restart: unless-stopped

    # 挂载机器人的 ROS 环境 + 项目配置/日志
    volumes:
      # ROS Humble 环境（rclpy / std_srvs / geometry_msgs 等系统级包）
      - /opt/ros/humble:/opt/ros/humble:ro
      # Unitree 工作空间（unitree_api 包）
      - /home/unitree/unitree_ros2_ws:/unitree_ws:ro
      # 配置只读挂载，改配置不用重打镜像
      - ./config/config.yaml:/app/config/config.yaml:ro
      # 日志读写挂载，宿主机可直接查看
      - ./logs:/app/logs

    environment:
      # ROS 2 域 ID，必须跟机器人其他 ROS 节点一致（G1 默认 0）
      - ROS_DOMAIN_ID=0
      # DDS 中间件，跟机器人一致（G1 用 Cyclone DDS）
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      # 时区
      - TZ=Asia/Shanghai

    # 日志驱动限制，避免日志撑爆磁盘
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
